Section "ServerFlags"
    Option "AutoAddDevices" "true"
    Option "DontVTSwitch" "false"
EndSection

Section "Device"
    Identifier "EquuleusSimpleFB"
    Driver "equuleusfbdev"
    Option "fbdev" "/dev/fb0"
    Option "ShadowFB" "true"
    Option "Rotate" "CW"
    Option "SafeInsetLeft" "96"
    Option "SafeInsetRight" "80"
EndSection

Section "Monitor"
    Identifier "EquuleusPanel"
EndSection

Section "InputClass"
    Identifier "EquuleusTouchscreen"
    MatchProduct "fts"
    MatchIsTouchscreen "on"
    Driver "libinput"
    Option "TransformationMatrix" "0 1.084942 -0.046332 -1 0 1 0 0 1"
EndSection

Section "Screen"
    Identifier "EquuleusScreen"
    Device "EquuleusSimpleFB"
    Monitor "EquuleusPanel"
    DefaultDepth 24
    SubSection "Display"
        Depth 24
    EndSubSection
EndSection

Section "ServerLayout"
    Identifier "EquuleusLayout"
    Screen "EquuleusScreen"
EndSection
